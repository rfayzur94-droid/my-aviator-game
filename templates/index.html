<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Aviator Professional - Live</title>
    <style>
        body { background-color: #0f0f12; color: white; font-family: Arial, sans-serif; text-align: center; margin: 0; }
        .header-bar { display: flex; justify-content: space-between; padding: 15px 30px; background: #14151a; border-bottom: 1px solid #272a33; }
        .balance-box { background: #28a745; padding: 5px 15px; border-radius: 5px; font-weight: bold; }
        #game-area { width: 90%; max-width: 600px; height: 280px; background-color: #14151a; margin: 20px auto; border-radius: 15px; position: relative; overflow: hidden; border: 2px solid #272a33; }
        #multiplier { font-size: 4rem; font-weight: bold; position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); }
        button { padding: 15px; font-size: 1.2rem; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; width: 100%; max-width: 600px; }
        #bet-btn { background-color: #e91e63; color: white; }
        #cashout-btn { background-color: #ff9800; color: white; display: none; }
        .pannel-container { display: flex; justify-content: center; gap: 20px; margin-top: 30px; padding: 20px; }
        .box { background: #14151a; padding: 20px; border-radius: 10px; border: 1px solid #272a33; width: 45%; max-width: 300px; text-align: left; }
        input, select { width: 90%; padding: 8px; margin: 8px 0; background: #1c1d24; color: white; border: 1px solid #444; border-radius: 4px; }
    </style>
</head>
<body>

    <div class="header-bar">
        <div>Player: <strong>{{ username }}</strong> | <a href="/logout" style="color: #aaa;">Logout</a></div>
        <div class="balance-box">Account Balance: <span id="user-balance">{{ balance }}</span> TK</div>
    </div>
    
    <div id="game-area">
        <div id="multiplier">1.00x</div>
    </div>

    <div style="padding: 0 20px;">
        <input type="number" id="bet-amount" value="100" min="10" style="max-width: 580px; text-align: center;"><br>
        <button id="bet-btn" onclick="startGame()">PLACE BET</button>
        <button id="cashout-btn" onclick="cashOut()">CASH OUT</button>
    </div>
    
    <div id="status" style="margin-top: 15px; font-weight: bold; color: #aaa;">Place a bet. If the plane flies away before Cashout, you lose!</div>

    <div class="pannel-container">
        <div class="box">
            <h3>Manual Deposit</h3>
            <p style="font-size: 0.8rem; color:#aaa;">Send money to: 017XXXXXXXX (Personal)</p>
            <form action="/transaction" method="POST">
                <input type="hidden" name="type" value="deposit">
                <select name="method"><option>bKash</option><option>Nagad</option><option>Rocket</option></select>
                <input type="text" name="number" placeholder="Your Sender Number" required>
                <input type="number" name="amount" placeholder="Amount" required>
                <input type="text" name="txid" placeholder="Transaction ID (TxID)" required>
                <button type="submit" style="background:#28a745; padding:8px; font-size:1rem;">Submit Deposit</button>
            </form>
        </div>

        <div class="box">
            <h3>Manual Withdraw</h3>
            <form action="/transaction" method="POST">
                <input type="hidden" name="type" value="withdraw">
                <select name="method"><option>bKash</option><option>Nagad</option><option>Rocket</option></select>
                <input type="text" name="number" placeholder="Your Receiver Number" required>
                <input type="number" name="amount" placeholder="Amount" required>
                <button type="submit" style="background:#cb2424; padding:8px; font-size:1rem;">Submit Withdrawal</button>
            </form>
        </div>
    </div>

    <script>
        let currentMultiplier = 1.00;
        let crashPoint = 0;
        let gameInterval;
        let isFlying = false;

        async function startGame() {
            if (isFlying) return;
            
            let betAmount = parseFloat(document.getElementById("bet-amount").value);
            let currentBalance = parseFloat(document.getElementById("user-balance").innerText);
            
            if (betAmount > currentBalance) {
                document.getElementById("status").innerText = "❌ Insufficient Balance!";
                return;
            }

            document.getElementById("status").innerText = "Plane is flying... Cash out before it flies away!";
            document.getElementById("multiplier").innerText = "1.00x";
            document.getElementById("multiplier").style.color = "white";
            
            const response = await fetch('/start-game', { method: 'POST' });
            const data = await response.json();
            crashPoint = data.secret_crash;

            document.getElementById("bet-btn").style.display = "none";
            document.getElementById("cashout-btn").style.display = "block";
            isFlying = true;
            currentMultiplier = 1.00;

            gameInterval = setInterval(async () => {
                if (currentMultiplier >= crashPoint) {
                    clearInterval(gameInterval);
                    isFlying = false;
                    document.getElementById("multiplier").innerText = "FLEW AWAY!";
                    document.getElementById("multiplier").style.color = "#cb2424";
                    document.getElementById("status").innerText = `💥 Crashed at ${crashPoint}x. You lost ${betAmount} TK!`;
                    
                    // ব্যাকএন্ডে লস ডাটা পাঠানো এবং ব্যালেন্স মাইনাস করা
                    await fetch('/game-result', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ action: 'loss', bet_amount: betAmount })
                    });
                    
                    // স্ক্রিনে ব্যালেন্স আপডেট
                    document.getElementById("user-balance").innerText = (currentBalance - betAmount).toFixed(2);
                    resetButtons();
                } else {
                    currentMultiplier += 0.01;
                    document.getElementById("multiplier").innerText = currentMultiplier.toFixed(2) + "x";
                }
            }, 50);
        }

        async function cashOut() {
            if (!isFlying) return;
            clearInterval(gameInterval);
            isFlying = false;
            
            let betAmount = parseFloat(document.getElementById("bet-amount").value);
            let currentBalance = parseFloat(document.getElementById("user-balance").innerText);
            let winnings = betAmount * currentMultiplier;
            let profit = winnings - betAmount;
            
            document.getElementById("multiplier").style.color = "#28a745";
            document.getElementById("status").innerText = `🎉 Successfully Cashed Out! Profit: +${profit.toFixed(2)} TK`;
            
            // ব্যাকএন্ডে উইন ডাটা পাঠানো এবং ব্যালেন্স প্লাস করা
            await fetch('/game-result', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ action: 'cashout', bet_amount: betAmount, rate: currentMultiplier })
            });
            
            document.getElementById("user-balance").innerText = (currentBalance + profit).toFixed(2);
            resetButtons();
        }

        function resetButtons() {
            document.getElementById("bet-btn").style.display = "block";
            document.getElementById("cashout-btn").style.display = "none";
        }
    </script>
</body>
</html>
