<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Aviator - Game Room</title>
    <style>
        body { background-color: #0f0f12; color: white; font-family: Arial, sans-serif; text-align: center; margin: 0; }
        .header-bar { display: flex; justify-content: space-between; padding: 15px 30px; background: #14151a; border-bottom: 1px solid #272a33; }
        .balance-box { background: #28a745; padding: 5px 15px; border-radius: 5px; font-weight: bold; }
        #game-area { width: 90%; max-width: 600px; height: 300px; background-color: #14151a; margin: 20px auto; border-radius: 15px; position: relative; overflow: hidden; border: 2px solid #272a33; }
        #plane { width: 50px; height: 40px; position: absolute; bottom: 20px; left: 20px; font-size: 40px; }
        #multiplier { font-size: 4rem; font-weight: bold; position: absolute; top: 30%; left: 50%; transform: translate(-50%, -50%); }
        button { padding: 15px 40px; font-size: 1.2rem; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; width: 100%; max-width: 600px; }
        #bet-btn { background-color: #e91e63; color: white; }
        #cashout-btn { background-color: #ff9800; color: white; display: none; }
    </style>
</head>
<body>

    <div class="header-bar">
        <div>Player: <strong>{{ username }}</strong> | <a href="/logout" style="color: #aaa;">Logout</a></div>
        <div class="balance-box">Demo Balance: <span id="user-balance">{{ balance }}</span> TK</div>
    </div>
    
    <div id="game-area">
        <div id="multiplier">1.00x</div>
        <div id="plane">✈️</div>
    </div>

    <div style="padding: 0 20px;">
        <input type="number" id="bet-amount" value="100" min="10" style="padding: 10px; width: 100%; max-width: 580px; margin-bottom: 10px; background: #1c1d24; color: white; border: 1px solid #444; border-radius: 5px; text-align: center;"><br>
        <button id="bet-btn" onclick="startGame()">PLACE BET</button>
        <button id="cashout-btn" onclick="cashOut()">CASH OUT</button>
    </div>
    
    <div id="status" style="margin-top: 20px; font-weight: bold; color: #aaa;">Place a bet to fly!</div>

    <script>
        let currentMultiplier = 1.00;
        let crashPoint = 0;
        let gameInterval;
        let isFlying = false;

        async function startGame() {
            if (isFlying) return;
            
            let betAmount = parseFloat(document.getElementById("bet-amount").value);
            let currentBalance = parseFloat(document.getElementById("user-balance").innerText);
            
            if (betAmount > currentBalance) {
                document.getElementById("status").innerText = "❌ Insufficient Balance!";
                return;
            }

            document.getElementById("user-balance").innerText = (currentBalance - betAmount).toFixed(2);
            document.getElementById("status").innerText = "The Plane is flying...";
            document.getElementById("multiplier").innerText = "1.00x";
            
            const response = await fetch('/start-game', { method: 'POST' });
            const data = await response.json();
            crashPoint = data.secret_crash;

            document.getElementById("bet-btn").style.display = "none";
            document.getElementById("cashout-btn").style.display = "block";
            isFlying = true;
            currentMultiplier = 1.00;

            gameInterval = setInterval(() => {
                if (currentMultiplier >= crashPoint) {
                    clearInterval(gameInterval);
                    document.getElementById("multiplier").innerText = "FLEW AWAY!";
                    document.getElementById("status").innerText = `💥 Crashed at ${crashPoint}x`;
                    resetButtons();
                } else {
                    currentMultiplier += 0.01;
                    document.getElementById("multiplier").innerText = currentMultiplier.toFixed(2) + "x";
                }
            }, 40);
        }

        function cashOut() {
            if (!isFlying) return;
            clearInterval(gameInterval);
            
            let betAmount = parseFloat(document.getElementById("bet-amount").value);
            let currentBalance = parseFloat(document.getElementById("user-balance").innerText);
            let winnings = betAmount * currentMultiplier;
            
            document.getElementById("user-balance").innerText = (currentBalance + winnings).toFixed(2);
            document.getElementById("status").innerText = `🎉 Won! +${winnings.toFixed(2)} TK`;
            
            resetButtons();
        }

        function resetButtons() {
            isFlying = false;
            document.getElementById("bet-btn").style.display = "block";
            document.getElementById("cashout-btn").style.display = "none";
        }
    </script>
</body>
</html>
